name: GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: main
          POSTGRES_PASSWORD: main
          POSTGRES_DB: main
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: intl, gd, pgsql, pdo_pgsql
          coverage: pcov

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit with coverage
        run: php vendor/bin/phpunit --coverage-html coverage --coverage-clover clover.xml
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://main:main@127.0.0.1:5432/main?serverVersion=15&charset=utf8

      - name: Generate pages site
        run: |
          mkdir -p _site
          cp -r coverage _site/coverage
          cp .github/pages/index.html _site/index.html
          cp .github/pages/style.css _site/style.css

          # Extract coverage percentage from clover.xml
          COVERAGE=$(php -r '
            $xml = simplexml_load_file("clover.xml");
            $metrics = $xml->project->metrics;
            $total = (int)$metrics["elements"];
            $covered = (int)$metrics["coveredelements"];
            echo $total > 0 ? round($covered / $total * 100, 1) : "N/A";
          ')

          # Replace placeholder with actual coverage value
          sed -i "s/COVERAGE_PLACEHOLDER/${COVERAGE}/" _site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
