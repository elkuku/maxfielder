# Configuración de OpenSpec para Maxfielder

# Backend a usar (engram | openspec | hybrid | none)
backend: openspec

# Reglas para apply (opcional)
rules:
  apply:
    td: false  # No usamos TDD en este proyecto
    test_command: "composer test-phpunit"
  
  # Reglas para nombres de archivos (opcional)
  proposal:
    max_words: 400
  spec:
    max_words: 650
    require_given_when_then: true
  design:
    max_words: 800
  tasks:
    max_words: 530
